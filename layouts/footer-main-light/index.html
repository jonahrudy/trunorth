      var $slides = $wrapper.children('.swiper-slide').toArray();
      // Fisher-Yates Shuffle (ES5-compatible)
      var i = $slides.length, j, temp;
      while (i--) {
        j = Math.floor(Math.random() * (i + 1));
        temp = $slides[i];
        $slides[i] = $slides[j];
        $slides[j] = temp;
      }
      // Reorder DOM
      $wrapper.empty();
      for (var k = 0; k < $slides.length; k++) {
        $wrapper.append($slides[k]);
      }
      // Destroy and reinitialize Swiper
      if ($carousel[0].swiper) {

      new Swiper($carousel[0], $carousel.data('settings'));
    });
  });
});
